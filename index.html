<!DOCTYPE html>
<html class="staticrypt-html">
<head>
  <meta charset="utf-8" />
  <title>Mi Biblioteca Virtual</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="cache-control" content="max-age=0" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
  <meta http-equiv="pragma" content="no-cache" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .staticrypt-html, .staticrypt-body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      background: #1a1612;
      position: relative;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('covers/portada.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35);
      z-index: 0;
    }

    /* spinner */
    .staticrypt-spinner-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .staticrypt-spinner {
      display: inline-block;
      width: 2rem;
      height: 2rem;
      border: 0.25em solid rgba(255,254,249,0.4);
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .staticrypt-content {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 320px;
    }

    .card-title {
      color: rgba(255,254,249,0.9);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    #staticrypt-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .staticrypt-password-container {
      position: relative;
      width: 100%;
    }

    #staticrypt-password {
      width: 100%;
      padding: 0.85rem 2.8rem 0.85rem 1.2rem;
      border: 1px solid rgba(255,254,249,0.25);
      border-radius: 50px;
      background: rgba(255,254,249,0.08);
      color: #fffef9;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      backdrop-filter: blur(8px);
    }
    #staticrypt-password::placeholder {
      color: rgba(255,254,249,0.35);
    }
    #staticrypt-password:focus {
      border-color: rgba(255,254,249,0.6);
      background: rgba(255,254,249,0.12);
    }

    .staticrypt-toggle-password-visibility {
      cursor: pointer;
      height: 18px;
      width: 18px;
      opacity: 50%;
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      filter: invert(1);
    }

    .staticrypt-decrypt-button {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 50px;
      background: #7C4B2A;
      color: #fffef9;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s;
      text-transform: uppercase;
    }
    .staticrypt-decrypt-button:hover { background: #5c3620; }

    /* hide remember me completely */
    #staticrypt-remember-label,
    .staticrypt-remember {
      display: none !important;
    }

    .card-footer {
      color: rgba(255,254,249,0.45);
      font-size: 0.72rem;
      text-align: center;
      letter-spacing: 0.04em;
    }

    .hidden { display: none !important; }
  </style>
</head>
