<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuestra Biblioteca Virtual</title>
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="pragma" content="no-cache" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0e0c;
      font-family: 'Georgia', serif;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Se redujo el gap para juntar el input y el botón */
      gap: 0.5rem; 
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 320px;
    }

    .title {
      color: rgba(255,254,249,0.85);
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 0.8rem; /* Margen compensatorio por la reducción del gap */
    }

    /* Contenedor relativo para posicionar el ícono dentro del input */
    .input-wrapper {
      position: relative;
      width: 100%;
    }

    #pwd {
      width: 100%;
      padding: 0.85rem 2.8rem 0.85rem 1.2rem; /* Extra padding a la derecha para no tapar el ícono */
      border: 1px solid rgba(255,254,249,0.2);
      border-radius: 50px;
      background: rgba(255,254,249,0.06);
      color: #fffef9;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    #pwd::placeholder { color: rgba(255,254,249,0.3); }
    #pwd:focus {
      border-color: rgba(255,254,249,0.5);
      background: rgba(255,254,249,0.1);
    }

    /* Estilos del botón del ícono */
    .eye-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,254,249,0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: rgba(255,254,249,0.9); }

    #btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 50px;
      background: #7C4B2A;
      color: #fffef9;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn:hover { background: #5c3620; }

    #error {
      color: #e07070;
      font-size: 0.8rem;
      text-align: center;
      min-height: 1.2em;
      letter-spacing: 0.03em;
    }

    .footer {
      color: rgba(255,254,249,0.3);
      font-size: 1rem;
      text-align: center;
      letter-spacing: 0.05em;
      margin-top: 0.8rem; /* Margen compensatorio */
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="title">Ingresa la contraseña</p>
    
    <div class="input-wrapper">
      <input id="pwd" type="password" placeholder="••••••••" autofocus />
      <button type="button" id="toggle-pwd" class="eye-btn" title="Mostrar contraseña">
        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </div>

    <p id="error"></p>
    <button id="btn">Entrar</button>
    <p class="footer">Acceso privado · Creado por Josu</p>
  </div>

  <script>
    // Lógica de validación
    function enter() {
      var val = document.getElementById('pwd').value.trim().toLowerCase();
      if (val === 'tolstoi') {
        window.location.href = 'biblioteca.html'; 
      } else {
        document.getElementById('error').textContent = 'Contraseña incorrecta';
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
      }
    }

    document.getElementById('btn').addEventListener('click', enter);
    document.getElementById('pwd').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') enter();
    });
    document.getElementById('pwd').addEventListener('input', function() {
      document.getElementById('error').textContent = '';
    });

    // Lógica para mostrar/ocultar contraseña
    const toggleBtn = document.getElementById('toggle-pwd');
    const pwdInput = document.getElementById('pwd');
    const eyeIcon = document.getElementById('eye-icon');

    toggleBtn.addEventListener('click', () => {
      const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
      pwdInput.setAttribute('type', type);

      // Alternar diseño del ícono (ojo cerrado vs ojo abierto)
      if (type === 'text') {
        eyeIcon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;
      } else {
        eyeIcon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
      }
    });
  </script>
</body>
</html>
