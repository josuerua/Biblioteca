<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Biblioteca Virtual</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      background: #1a1612;
      position: relative;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('covers/portada.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 340px;
    }

    .title {
      color: rgba(255,254,249,0.9);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    #passphrase-input {
      width: 100%;
      padding: 0.85rem 1.2rem;
      border: 1px solid rgba(255,254,249,0.25);
      border-radius: 50px;
      background: rgba(255,254,249,0.08);
      color: #fffef9;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      backdrop-filter: blur(8px);
    }
    #passphrase-input::placeholder {
      color: rgba(255,254,249,0.35);
      letter-spacing: 0.1em;
    }
    #passphrase-input:focus {
      border-color: rgba(255,254,249,0.6);
      background: rgba(255,254,249,0.12);
    }

    #decrypt-button {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 50px;
      background: #7C4B2A;
      color: #fffef9;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s;
    }
    #decrypt-button:hover { background: #5c3620; }

    #passphrase-form.hidden { display: none; }

    #instructions {
      color: rgba(255,254,249,0.5);
      font-size: 0.75rem;
      text-align: center;
      letter-spacing: 0.03em;
    }

    /* Error message */
    #password-error {
      color: #e07070;
      font-size: 0.82rem;
      text-align: center;
      display: none;
    }
    #password-error.visible { display: block; }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="card">
    <p class="title">Ingresa la contraseña</p>

    <form id="passphrase-form" action="#" method="post" autocomplete="off">
      <div style="display:flex; flex-direction:column; gap:0.9rem; width:100%;">
        <input
          id="passphrase-input"
          type="password"
          name="password"
          placeholder="••••••••"
          autofocus
        />
        <p id="password-error">Contraseña incorrecta</p>
        <button id="decrypt-button" type="submit">Entrar</button>
      </div>
    </form>

    <p id="instructions">Acceso privado · Biblioteca de Josu</p>
  </div>

  {{{crypto_tag}}}
  {{{staticrypt_config}}}
  {{{crypto_init}}}

  <script>
    // Remove any "remember me" functionality
    var form = document.getElementById('passphrase-form');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var pwd = document.getElementById('passphrase-input').value;
      var err = document.getElementById('password-error');

      if (staticrypt_config && typeof decrypt === 'function') {
        decrypt(pwd).then(function(decrypted) {
          if (decrypted) {
            document.open();
            document.write(decrypted);
            document.close();
          } else {
            err.classList.add('visible');
            document.getElementById('passphrase-input').value = '';
          }
        });
      }
    });

    document.getElementById('passphrase-input').addEventListener('input', function() {
      document.getElementById('password-error').classList.remove('visible');
    });
  </script>
</body>
</html>
